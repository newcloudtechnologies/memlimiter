# Defines the configuration version.
# The only possible value is "2".
version: "2"

linters:
  # Default set of linters.
  # The value can be:
  # - `standard`: the "Default" linters https://golangci-lint.run/docs/linters/#all-linters
  # - `all`: enables all linters by default.
  # - `none`: disables all linters by default.
  # - `fast`: enables only linters considered as "fast".
  # Default: standard
  default: all

  # Disable specific linters.
  disable:
    - err113 # Often over-constrains error construction.
    - exhaustruct # Huge maintenance tax on external structs.
    - godox # Useless.
    - ireturn # Too dogmatic for Go APIs, interfaces at boundaries are normal.
    - lll # Replaced by golines formatter.
    - mnd # Noisy in tests and math-heavy code.
    - noinlineerr # Directly contradicts idiomatic if err := ...; err != nil style.
    - paralleltest # It's not clear when and how to use t.Parallel().
    - promlinter # Too many bugs.
    - testpackage # Seriously limits testing capabilities.
    - varnamelen # Fights idiomatic Go short local names and creates review noise.
    - wrapcheck # It causes "wrap for wrapping's sake" issues.
    - wsl # Deprecated.

  # All available settings of specific linters.
  settings:
    depguard:
      # Rules to apply.
      # Default (applies if no custom rules are defined): only allow $gostd in all files.
      rules:
        # Name of a rule.
        logger:
          # logrus is allowed to use only in logutils package.
          # List of file globs that will match this rule.
          # Default: $all
          files:
            - "!**/pkg/logutils/**.go"
          # List of packages that are not allowed.
          # Default: []
          deny:
            - pkg: github.com/sirupsen/logrus
              desc: logging is allowed only by logutils.Log

    dupl:
      # tokens count to trigger issue, 150 by default
      threshold: 100

    errcheck:
      # old `ignore: fmt:.*,os:^Read.*` was removed in v2.
      # `fmt:.*` remains covered by errcheck built-ins.
      # `os:^Read.*` has to be approximated with explicit functions.
      # List of functions to exclude from checking.
      # See https://github.com/kisielk/errcheck#excluding-functions for details.
      exclude-functions:
        - os.ReadDir
        - os.ReadFile
        - os.Readlink

    funlen:
      # Checks the number of lines in a function.
      # If lower than 0, disable the check.
      # Default: 60
      lines: 80

    gocognit:
      # minimal code complexity to report, 30 by default (but we recommend 10-20)
      min-complexity: 20

    gocritic:
      # Which checks should be enabled in addition to default checks; can't be combined with 'disabled-checks'.
      # By default, list of stable checks is used (https://go-critic.com/overview#checks-overview).
      # To see which checks are enabled run `GL_DEBUG=gocritic golangci-lint run --enable=gocritic`.
      # enabled-checks:

      # Which checks should be disabled; can't be combined with 'enabled-checks'.
      # Default: []
      disabled-checks:
        #      - regexpMust
        - whyNoLint # Too much information, alas...
        - dupImport # Breaks on CGO: https://github.com/go-critic/go-critic/issues/845
        - octalLiteral # Strange linter, I don't know what it wants.

      # Enable multiple checks by tags in addition to default checks.
      # Run `GL_DEBUG=gocritic golangci-lint run --enable=gocritic` to see all tags and checks.
      # See https://github.com/go-critic/go-critic#usage -> section "Tags".
      # Default: []
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated

      # Settings passed to gocritic.
      # The settings key is the name of a supported gocritic checker.
      # The list of supported checkers can be found at https://go-critic.com/overview.
      settings:
        # Must be valid enabled check name.
        rangeValCopy:
          sizeThreshold: 32

    gocyclo:
      # minimal code complexity to report, 30 by default (but we recommend 10-20)
      min-complexity: 10

    godox:
      # report any comments starting with keywords, this is useful for TODO or FIXME comments that
      # might be left in the code accidentally and should be resolved before merging
      keywords: # default keywords are TODO, BUG, and FIXME, these can be overwritten by this setting
        - NOTE
        - OPTIMIZE # marks code that should be optimized before merging
        - HACK # marks hack-arounds that should be removed before merging

    govet:
      # Settings per analyzer.
      settings:
        # Analyzer name, run `go tool vet help` to see all analyzers.
        printf:
          # Comma-separated list of print function names to check
          # (in addition to defaults, see `go tool vet help printf`).
          # Default: []
          funcs:
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Fatalf

      # Enable analyzers by name.
      # Default: []
      enable:
        - shadow
      enable-all: true
      # Disable fieldalignment because it conflicts with embeddedstructfieldcheck
      # ordering and hurts readability in embedded/mock-heavy structs.
      disable:
        - fieldalignment

    misspell:
      # Correct spellings using locale preferences for US or UK.
      # Setting locale to US will correct the British spelling of 'colour' to 'color'.
      # Default is to use a neutral variety of English.
      locale: US
      # Typos to ignore.
      # Should be in lower case.
      # Default: []
      ignore-rules:
        - someword

    mnd:
      # List of numbers to exclude from analysis.
      # The numbers should be written as string.
      # Values always ignored: "1", "1.0", "0" and "0.0".
      # Default: []
      ignored-numbers:
        - "0"
        - "1"

    rowserrcheck:
      # database/sql is always checked.
      # Default: []
      packages:
        - github.com/jmoiron/sqlx

    tagliatelle:
      # Checks the struct tag name case.
      case:
        # Use the struct field name to check the name of the struct tag.
        use-field-name: true
        # Defines the association between tag name and case.
        # Any struct tag name can be used.
        # Supported string cases:
        # - `camel`, `pascal`, `kebab`, `snake`, `upperSnake`
        # - `goCamel`, `goPascal`, `goKebab`, `goSnake`
        # - `upper`, `lower`, `header`
        rules:
          json: snake
          yaml: snake
          xml: snake
          bson: snake
          avro: snake
          mapstructure: kebab

    wrapcheck:
      # An array of strings that specify globs of packages to ignore.
      # Default: []
      ignore-package-globs:
        - gitlab.stageoffice.ru/UCS-COMMON/utils/breaker
        - github.com/stretchr/testify*
        - google.golang.org/grpc*

    wsl:
      # Allow calls and assignments to be cuddled as long as the lines have any
      # matching variables, fields or types. Default is true.
      allow-assign-and-call: false
      # Allow multiline assignments to be cuddled. Default is true.
      allow-multiline-assign: false

  # Defines a set of rules to ignore issues.
  # It does not skip analysis and does not ignore "typecheck" errors.
  exclusions:
    # Mode of the generated files analysis.
    # Default: strict
    generated: lax

    # Excluding configuration per-path, per-linter, per-text and per-source.
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - dupl
          - gosec
          - funlen
          - gocognit
          - mnd

      - path: "test_.*\\.go$"
        linters:
          - funlen
          - mnd
          - gocognit

      - path: mock.go
        text: "exported type"
        linters:
          - revive

      - path: mock.go
        text: "exported function"
        linters:
          - revive

      - path: mock.go
        text: "exported method"
        linters:
          - revive

      - path: mock.go
        linters:
          - mnd

      - path: config.go
        text: "fieldalignment"

    # Which file paths to exclude: they will be analyzed,
    # but issues from them won't be reported.
    # Default: []
    paths:
      - vendor$
      - third_party$
      - testdata$
      - examples$
      - Godeps$
      - builtin$
      - src/external_libs
      - autogenerated_by_my_lib
      - ".*\\.my\\.go$"
      - lib/bad.go

formatters:
  # Enable specific formatters.
  # Default: [] (uses standard Go formatting)
  enable:
    - gofmt
    - goimports
    - golines

  # Formatters settings.
  settings:
    goimports:
      # A list of prefixes, which, if set, checks import paths
      # with the given prefixes are grouped after 3rd-party packages.
      # Default: []
      local-prefixes:
        - github.com/org/project
    golines:
      # Target maximum line length.
      # Default: 100
      max-len: 140

  # Formatter exclusions.
  exclusions:
    # Which file paths to exclude.
    # Default: []
    paths:
      - vendor$
      - third_party$
      - testdata$
      - examples$
      - Godeps$
      - builtin$
      - src/external_libs
      - autogenerated_by_my_lib
      - ".*\\.my\\.go$"
      - lib/bad.go

issues:
  # Maximum issues count per one linter.
  # Set to 0 to disable.
  # Default: 50
  max-issues-per-linter: 0

  # Maximum count of issues with the same text.
  # Set to 0 to disable.
  # Default: 3
  max-same-issues: 0

# Options for analysis running.
run:
  # Number of operating system threads (`GOMAXPROCS`) that can execute golangci-lint simultaneously.
  # Default: 0 (automatically set to match Linux container CPU quota and
  # fall back to the number of logical CPUs in the machine)
  concurrency: 4

  # Timeout for total work, e.g. 30s, 5m, 5m30s.
  # If the value is lower or equal to 0, the timeout is disabled.
  # Default: 0 (disabled)
  timeout: 5m

  # List of build tags, all linters use it.
  # Default: []
  build-tags:
    - mytag
